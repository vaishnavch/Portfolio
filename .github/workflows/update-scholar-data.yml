name: Update Scholar Publications

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Refresh Scholar data
        shell: pwsh
        run: |
          .\scripts\refresh-scholar-data.ps1

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/publications.json
          if (git diff --cached --quiet) {
            Write-Host "No publication changes to commit."
          } else {
            git commit -m "chore: refresh scholar publication data"
            git push
          }
